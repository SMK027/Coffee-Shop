version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: app_web
    ports:
      - "8099:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - /var/www/html/public/build
    environment:
      - APP_NAME=${APP_NAME:-ToolBox}
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=true
      - APP_URL=${APP_URL:-http://localhost:8099}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_NAME:-app_db}
      - DB_USERNAME=${DB_USER:-app_user}
      - DB_PASSWORD=${DB_PASS:-app_password}
      - MAIL_MAILER=smtp
      - MAIL_HOST=${SMTP_HOST:-mailpit}
      - MAIL_PORT=${SMTP_PORT:-1025}
      - MAIL_USERNAME=${SMTP_USER}
      - MAIL_PASSWORD=${SMTP_PASS}
      - MAIL_ENCRYPTION=${SMTP_ENCRYPTION:-null}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-hello@example.com}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-ToolBox}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

  db:
    image: mariadb:10.11
    container_name: app_db
    command: --default-time-zone='+01:00'
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ${DB_NAME:-app_db}
      MYSQL_USER: ${DB_USER:-app_user}
      MYSQL_PASSWORD: ${DB_PASS:-app_password}
    ports:
      - "3315:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: app_phpmyadmin
    ports:
      - "8100:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER:-app_user}
      PMA_PASSWORD: ${DB_PASS:-app_password}
    depends_on:
      - db
    networks:
      - app_network
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    container_name: app_mailpit
    ports:
      - "8026:8025"
      - "1026:1025"
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge
